name: Deploy GitHub Pages

env:
  ASTRO_TELEMETRY_DISABLED: 1

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout homepage
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Checkout private resume
        uses: actions/checkout@v7
        with:
          repository: mindorigin150/resume
          path: _resume
          ssh-key: ${{ secrets.RESUME_DEPLOY_KEY }}
          persist-credentials: false

      - name: Install and validate site
        run: |
          npm ci
          npm run check

      - name: Build static site artifact
        run: |
          test -f _resume/main.pdf

          npm run build

          mkdir -p dist/data
          cp _resume/main.pdf dist/data/resume.pdf
          if [[ -f _resume/main_zh.pdf ]]; then
            cp _resume/main_zh.pdf dist/data/resume-zh.pdf
          fi
          touch dist/.nojekyll

          npm run verify:deploy

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
