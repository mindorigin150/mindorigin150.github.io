name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout homepage
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Checkout private resume
        uses: actions/checkout@v7
        with:
          repository: mindorigin150/resume
          path: _resume
          ssh-key: ${{ secrets.RESUME_DEPLOY_KEY }}
          persist-credentials: false

      - name: Build static site artifact
        run: |
          test -f _resume/main.pdf

          rm -rf _site
          mkdir -p _site

          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitmodules' \
            --exclude='_resume' \
            --exclude='_site' \
            --exclude='resume' \
            ./ _site/

          mkdir -p _site/data
          cp _resume/main.pdf _site/data/resume.pdf

          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
